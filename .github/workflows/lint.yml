name: Bash Lint & Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install shellcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Run shellcheck
      run: |
        shellcheck nexpeas.sh || true
        shellcheck server.py || true

    - name: Check syntax
      run: |
        bash -n nexpeas.sh
        python3 -m py_compile server.py

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Test script execution (dry-run)
      run: |
        bash -x nexpeas.sh 2>&1 | head -50 || true

    - name: Verify file integrity
      run: |
        [ -f nexpeas.sh ] && echo "✓ nexpeas.sh exists"
        [ -f server.py ] && echo "✓ server.py exists"
        [ -f README.md ] && echo "✓ README.md exists"
        [ -f LICENSE ] && echo "✓ LICENSE exists"
